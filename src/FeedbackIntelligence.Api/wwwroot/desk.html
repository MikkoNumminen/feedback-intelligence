<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback — desk entry</title>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1c2430; --mut:#66707d; --line:#d9dde3;
          --acc:#0b5fa5; --ok:#1b7f4d; --warn:#b3541e; --err:#b3261e; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width:34rem; margin:0 auto; padding:1rem; }
  h1 { font-size:1.15rem; margin:.5rem 0 1rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:.75rem;
          padding:1rem; margin-bottom:1rem; }
  textarea { width:100%; min-height:6.5rem; font:inherit; padding:.65rem;
             border:1px solid var(--line); border-radius:.5rem; resize:vertical; }
  textarea[readonly] { background:#eef1f4; color:var(--mut); }
  label { display:block; font-size:.8rem; color:var(--mut); margin:.7rem 0 .2rem; }
  select, input[type=text] { width:100%; font:inherit; padding:.55rem;
             border:1px solid var(--line); border-radius:.5rem; background:#fff; }
  button { font:inherit; font-weight:600; border:0; border-radius:.6rem;
           padding:.8rem 1.1rem; cursor:pointer; min-height:48px; }
  .primary { background:var(--acc); color:#fff; width:100%; }
  .primary:disabled { opacity:.55; cursor:default; }
  .ghost { background:transparent; color:var(--acc); }
  .row { display:flex; gap:.6rem; margin-top:1rem; }
  .row button { flex:1; }
  .status { margin:.6rem 0 0; font-size:.9rem; min-height:1.3rem; }
  .status.ok { color:var(--ok); } .status.err { color:var(--err); } .status.warn { color:var(--warn); }
  .corrected { outline:2px solid var(--warn); outline-offset:1px; }
  .hint { font-size:.8rem; color:var(--mut); margin-top:.4rem; }
  #interpret-card { display:none; }
  .segment-head { display:flex; justify-content:space-between; align-items:center; gap:.6rem; }
  .segment-head button { min-height:36px; padding:.35rem .7rem; }
  .seg-total { font-size:.85rem; color:var(--mut); margin:.3rem 0 .6rem; }
  .seg-alert { border-left:3px solid var(--err); padding:.4rem .6rem; margin:.5rem 0;
               background:#faf3f2; border-radius:.35rem; font-size:.9rem; }
  .seg-theme { border-top:1px solid var(--line); padding:.7rem 0 .2rem; }
  .seg-theme h3 { font-size:.95rem; margin:0 0 .15rem; }
  .seg-meta { font-size:.8rem; color:var(--mut); margin:0 0 .35rem; }
  .seg-narrative { font-size:.9rem; margin:0 0 .5rem; }
  .seg-items { list-style:none; margin:0 0 .6rem; padding:0; }
  .seg-items li { font-size:.85rem; padding:.25rem 0; border-top:1px dashed var(--line); }
  .seg-items .sev { font-weight:600; margin-right:.35rem; }
  .seg-items .when { color:var(--mut); margin-left:.35rem; font-size:.78rem; }
  .flagwarn { color:#8a5a00; font-weight:600; font-size:.85rem; margin:0 0 .4rem; }
  .seg-overall { background:#f0f4f8; border:1px solid var(--line); border-radius:.5rem;
                 padding:.6rem .8rem; margin:.4rem 0 .8rem; }
  .seg-overall h3 { font-size:.95rem; margin:0 0 .3rem; }
  .seg-overall .seg-meta { margin:.25rem 0 0; }
  .seg-tag { font-size:.72rem; font-weight:400; color:var(--mut); border:1px solid var(--line);
             border-radius:.4rem; padding:.05rem .35rem; margin-left:.45rem; vertical-align:middle; }
</style>
</head>
<body>
<main>
  <h1 id="h1"></h1>

  <div class="card">
    <label for="text" id="textLabel"></label>
    <textarea id="text" maxlength="800" autofocus></textarea>
    <div class="hint"><span id="chars">0</span>/800 <span id="charsWord"></span></div>
    <div class="row"><button class="primary" id="interpret" disabled></button></div>
    <p class="status" id="status1"></p>
  </div>

  <div class="card" id="interpret-card">
    <strong id="interpretHeading"></strong>
    <label for="category" id="categoryLabel"></label>
    <select id="category"></select>
    <label for="theme" id="themeLabel"></label>
    <input type="text" id="theme" maxlength="120">
    <label for="severity" id="severityLabel"></label>
    <select id="severity"></select>
    <label for="type" id="typeLabel"></label>
    <select id="type"></select>
    <div class="row">
      <button class="ghost" id="cancel"></button>
      <button class="primary" id="save"></button>
    </div>
    <p class="status" id="status2"></p>
  </div>

  <!-- The live desk segment (ADR-0024): the situational view over THIS desk's own
       channel — its own database, untouched by (and untouching) the demo corpus. -->
  <div class="card" id="segment">
    <div class="segment-head">
      <strong id="segmentHeading"></strong>
      <button class="ghost" id="segmentRefresh"></button>
    </div>
    <p class="status" id="segmentStatus"></p>
    <div id="segmentBody"></div>
  </div>
</main>

<script src="./config.js"></script>
<script src="./charts.js"></script>
<script>
"use strict";
// Same-origin locally; on the static host, config.js (written at publish
// time) points API at the Tailscale Funnel backend.
const API = window.API_BASE || "";
const el = id => document.getElementById(id);

// All user-facing text keyed by domain language (from /schema). Retail is "fi";
// game and any new domain default to "en". Category field label comes from the
// domain (categoryField), not from here.
const STR = {
  fi: {
    htmlLang: "fi", locale: "fi-FI", pageTitle: "Palaute — tiskikirjaus",
    h1: "Tiskikirjaus — kirjaa asiakaspalaute yhdellä lauseella",
    textLabel: "Mitä asiakas sanoi?",
    placeholder: "esim. asiakas sano et maitokaapis oli vanhoi purkkei",
    charsWord: "merkkiä", interpret: "Tulkitse", connecting: "Yhdistetään palvelimeen…",
    interpretHeading: "Tulkinta — tarkista ja korjaa tarvittaessa",
    theme: "Aihe", severity: "Vakavuus", type: "Tyyppi", cancel: "Peruuta", save: "Tallenna",
    writeFirst: "Kirjoita palaute ensin.", interpreting: "Tulkitaan…",
    busy: "Ruuhkaa — yritä hetken päästä uudelleen.", interpretFailed: "Tulkinta epäonnistui.",
    modelFailed: "Automaattinen tulkinta ei onnistunut — täytä kentät itse.",
    interpretDone: "Tulkinta valmis — tarkista alta.", connError: "Yhteysvirhe — palvelin ei vastaa.",
    serverDown: "Palvelin ei vastaa — yritetään uudelleen…",
    selectionsMissing: "Valinnat puuttuvat — päivitä sivu ja yritä uudelleen.",
    chooseCategory: "Valitse luokka ennen tallennusta.",
    themeEmpty: "Aihe ei voi olla tyhjä.", saving: "Tallennetaan…",
    busyShort: "Ruuhkaa — yritä hetken päästä.", saveFailed: "Tallennus epäonnistui.",
    savedAlready: "Kirjattu ✓ (oli jo tallennettu)", savedThanks: "Kirjattu ✓ — kiitos!",
    saveUncertain: "Yhteysvirhe — tallennus jäi epävarmaksi. Yritä uudelleen: sama kirjaus ei tuplaannu.",
    segmentHeading: "Tiskin palautetilanne", segmentRefresh: "Päivitä",
    segmentLoading: "Tekoäly analysoi kirjauksia…",
    segmentEmpty: "Ei vielä kirjauksia — tallenna ensimmäinen palaute yllä.",
    segmentError: "Tilannekuvaa ei saatu — palvelin ei vastaa.",
    segmentTotal: "kirjausta ikkunassa", segmentAlerts: "Hälytykset",
    segmentUnstructured: "ilman rakennetta (tulkinta ei onnistunut)",
    itemsWord: "palautetta",
    flaggedTheme: "tarkistettavana", flaggedHint: "mahdollinen manipulointi — mukana laskennassa",
    summaryHeading: "Yhteenveto",
    summaryPending: "Tekoäly kirjoittaa yhteenvetoa…",
    summaryFailed: "Yhteenveto ei päivittynyt — kirjaukset näkyvät alla.",
    chartCategories: "Palautteet aiheittain", chartSeverity: "Vakavuusjakauma",
    tileEntries: "Kirjauksia", tileFlagged: "Tarkistettavana", tileTrend: "Suunta",
  },
  en: {
    htmlLang: "en", locale: "en-GB", pageTitle: "Feedback — desk entry",
    h1: "Desk entry — log feedback in one sentence",
    textLabel: "What did they say?",
    placeholder: "e.g. what the customer/player said, in their own words",
    charsWord: "characters", interpret: "Interpret", connecting: "Connecting to the server…",
    interpretHeading: "Interpretation — review and correct if needed",
    theme: "Theme", severity: "Severity", type: "Type", cancel: "Cancel", save: "Save",
    writeFirst: "Write the feedback first.", interpreting: "Interpreting…",
    busy: "Busy — try again in a moment.", interpretFailed: "Interpretation failed.",
    modelFailed: "Automatic interpretation failed — fill the fields yourself.",
    interpretDone: "Interpretation ready — review below.", connError: "Connection error — the server is not responding.",
    serverDown: "Server not responding — retrying…",
    selectionsMissing: "Selections missing — refresh the page and try again.",
    chooseCategory: "Choose a category before saving.",
    themeEmpty: "Theme cannot be empty.", saving: "Saving…",
    busyShort: "Busy — try again shortly.", saveFailed: "Save failed.",
    savedAlready: "Saved ✓ (was already stored)", savedThanks: "Saved ✓ — thanks!",
    saveUncertain: "Connection error — the save is uncertain. Try again: the same entry won't duplicate.",
    segmentHeading: "Desk feedback situation", segmentRefresh: "Refresh",
    segmentLoading: "The AI is analyzing the entries…",
    segmentEmpty: "No entries yet — save the first feedback above.",
    segmentError: "Situation view unavailable — the server is not responding.",
    segmentTotal: "entries in the window", segmentAlerts: "Alerts",
    segmentUnstructured: "without structure (interpretation failed)",
    itemsWord: "items",
    flaggedTheme: "to review", flaggedHint: "possible manipulation — still counted",
    summaryHeading: "Summary",
    summaryPending: "The AI is writing the summary…",
    summaryFailed: "The summary did not refresh — entries are shown below.",
    chartCategories: "Feedback by topic", chartSeverity: "Severity distribution",
    tileEntries: "Entries", tileFlagged: "To review", tileTrend: "Trend",
  },
};

// Per-entry state. interpretedText is captured at interpret time and is the
// ONLY text ever saved. entryId makes save retries idempotent (server 409s).
let model = null, interpretedText = null, language = "fi", entryId = null, modelFailed = false;
// Default to the engine default (en); resolve to the domain language once /schema
// lands. Offline stays en (never a wrong specific language) — matches index.html.
let schemaLoaded = false, schema = null, L = STR.en;

function fillSelect(select, values, labels) {
  select.innerHTML = "";
  for (const value of values) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = (labels && labels[value]) ?? value;
    select.appendChild(option);
  }
}

// Apply the language bundle to the static chrome. Called once at boot (en, no
// schema yet) and again once /schema resolves the domain language.
function applyLanguage(lang) {
  L = STR[lang] || STR.en;
  document.documentElement.lang = L.htmlLang;
  document.title = L.pageTitle;
  el("h1").textContent = L.h1;
  el("textLabel").textContent = L.textLabel;
  el("text").placeholder = L.placeholder;
  el("charsWord").textContent = L.charsWord;
  el("interpret").textContent = L.interpret;
  el("interpretHeading").textContent = L.interpretHeading;
  el("themeLabel").textContent = L.theme;
  el("severityLabel").textContent = L.severity;
  el("typeLabel").textContent = L.type;
  el("cancel").textContent = L.cancel;
  el("save").textContent = L.save;
  el("segmentHeading").textContent = L.segmentHeading;
  el("segmentRefresh").textContent = L.segmentRefresh;
  // Re-render only when the language actually changed — /schema resolving to the
  // boot language must not rebuild the segment DOM a second time.
  if (lastReport && renderedL !== L) renderSegment(lastReport);
  else if (lastItems && renderedL !== L) renderQuick(lastItems);
  // Category label is the DOMAIN's word (osasto / area) — only known once /schema lands.
  if (schema && schema.categoryField) {
    const cf = schema.categoryField;
    el("categoryLabel").textContent = cf.charAt(0).toUpperCase() + cf.slice(1);
  }
}

const pick = (list, preferred) => (list.includes(preferred) ? preferred : list[0]);

async function loadSchema() {
  try {
    const res = await fetch(`${API}/schema`);
    if (!res.ok) throw new Error();
    schema = await res.json();
    applyLanguage(schema.language);
    // Labels come from the active domain — no domain values hardcoded here.
    fillSelect(el("category"), schema.categories, schema.categoryLabels);
    fillSelect(el("severity"), schema.severities, schema.severityLabels);
    fillSelect(el("type"), schema.types, schema.typeLabels);
    schemaLoaded = true;
    el("interpret").disabled = false;
    setStatus("status1", "", "");
    // If phase A painted before /schema arrived, its category labels were raw
    // keys — re-render now that labels exist (phase B repaints anyway when the
    // report lands; this covers the window before it).
    if (!lastReport && lastItems) renderQuick(lastItems);
  } catch {
    schemaLoaded = false;
    el("interpret").disabled = true;
    setStatus("status1", "err", L.serverDown);
    setTimeout(loadSchema, 3000);
  }
}

el("text").addEventListener("input", () => { el("chars").textContent = el("text").value.length; });

el("interpret").addEventListener("click", async () => {
  if (!schemaLoaded) return;
  const text = el("text").value.trim();
  if (!text) { setStatus("status1", "err", L.writeFirst); return; }
  el("interpret").disabled = true;
  setStatus("status1", "", L.interpreting);
  try {
    const res = await fetch(`${API}/interpret`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (res.status === 503) { setStatus("status1", "warn", L.busy); return; }
    if (!res.ok) { setStatus("status1", "err", L.interpretFailed); return; }
    const data = await res.json();
    startEntry(text);
    if (data.failed || !data.structure) {
      // Model failed: human authors the structure; the failure is recorded
      // (modelInterpretationFailed) so telemetry never mistakes this for a
      // zero-correction success. Defaults are drawn from the active domain.
      model = null;
      modelFailed = true;
      setStatus("status1", "warn", L.modelFailed);
      showForm({
        category: schema.categories[0],
        theme: "",
        severity: pick([...schema.severities], "medium"),
        type: pick([...schema.types], "other"),
        language: schema.language,
      });
      // The model gave no category — force the clerk to choose one rather than
      // silently defaulting to a real category (which risks misfiling). The save
      // gate blocks an empty category.
      el("category").selectedIndex = -1;
      return;
    }
    model = data.structure;
    modelFailed = false;
    setStatus("status1", "ok", L.interpretDone);
    showForm(data.structure);
  } catch {
    setStatus("status1", "err", L.connError);
  } finally {
    el("interpret").disabled = false;
  }
});

function startEntry(text) {
  interpretedText = text;
  entryId = "desk-" + crypto.randomUUID();
  el("text").readOnly = true;
}

function endEntry() {
  interpretedText = null;
  entryId = null;
  model = null;
  modelFailed = false;
  el("text").readOnly = false;
}

function showForm(structure) {
  language = structure.language || schema.language;
  el("category").value = structure.category;
  el("theme").value = structure.theme;
  el("severity").value = structure.severity;
  el("type").value = structure.type;
  for (const id of ["category", "theme", "severity", "type"]) el(id).classList.remove("corrected");
  el("interpret-card").style.display = "block";
  setStatus("status2", "", "");
  el("interpret-card").scrollIntoView({ behavior: "smooth" });
}

function markCorrections() {
  if (!model) return;
  for (const field of ["category", "theme", "severity", "type"])
    el(field).classList.toggle("corrected", el(field).value !== model[field]);
}
for (const field of ["category", "theme", "severity", "type"])
  el(field).addEventListener("change", markCorrections);
el("theme").addEventListener("input", markCorrections);

el("cancel").addEventListener("click", () => {
  el("interpret-card").style.display = "none";
  endEntry();
  setStatus("status1", "", "");
});

el("save").addEventListener("click", async () => {
  const accepted = {
    category: el("category").value,
    theme: el("theme").value.trim(),
    severity: el("severity").value,
    type: el("type").value,
    language,
  };
  if (!accepted.category) { setStatus("status2", "err", L.chooseCategory); return; }
  if (!accepted.severity || !accepted.type) {
    setStatus("status2", "err", L.selectionsMissing);
    return;
  }
  if (!accepted.theme) { setStatus("status2", "err", L.themeEmpty); return; }

  const corrections = [];
  if (model)
    for (const field of ["category", "theme", "severity", "type"])
      if (accepted[field] !== model[field])
        corrections.push({ field, modelValue: model[field], humanValue: accepted[field] });

  el("save").disabled = true;
  setStatus("status2", "", L.saving);
  try {
    // The live channel (ADR-0024): desk entries have their own database and
    // situational segment; the demo corpus flows through /feedback, never here.
    const res = await fetch(`${API}/live/feedback`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id: entryId,
        source: "desk",
        text: interpretedText,
        timestamp: new Date().toISOString(),
        acceptedStructure: accepted,
        corrections: corrections.length > 0 ? corrections : null,
        modelInterpretationFailed: modelFailed,
      }),
    });
    if (res.status === 503) { setStatus("status2", "warn", L.busyShort); return; }
    // 409 = an earlier attempt of THIS entry already landed: that is a success.
    if (!res.ok && res.status !== 409) { setStatus("status2", "err", L.saveFailed); return; }
    setStatus("status1", "ok", res.status === 409 ? L.savedAlready : L.savedThanks);
    el("interpret-card").style.display = "none";
    endEntry();
    el("text").value = "";
    el("chars").textContent = "0";
    el("text").focus();
    // The ingest invalidated the live report cache — this refetch runs a fresh
    // synthesis, so the entry just saved appears in the segment below.
    loadSegment();
  } catch {
    setStatus("status2", "warn", L.saveUncertain);
  } finally {
    el("save").disabled = false;
  }
});

function setStatus(id, kind, message) {
  const node = el(id);
  node.className = "status" + (kind ? " " + kind : "");
  node.textContent = message;
}

// ----- The live desk segment (ADR-0024; summary view + emergent topics ADR-0026) -----
// Two-phase render: the raw entry list (fast, no LLM) paints IMMEDIATELY on
// every load so a refresh never shows an empty segment, then GET /live/report
// (one whole-window synthesis) replaces it with the authoritative view —
// Yhteenveto on top, category sections below, the catch-all category split
// into the AI-named emergent topics. All feedback text lands via textContent —
// hostile input must never reach innerHTML.
let segmentBusy = false;
// A refresh requested while one is in flight must RUN AGAIN after it, not be
// dropped: the in-flight response predates the just-saved entry, so dropping the
// request would leave the fresh entry invisible until a manual refresh.
let segmentQueued = false;
let lastReport = null;   // re-render (not refetch) when /schema resolves the language
let lastItems = null;    // phase-A raw items, for the summary-failed degradation path
let renderedL = null;    // the language bundle the segment was last rendered with

function node(tag, className, text) {
  const n = document.createElement(tag);
  if (className) n.className = className;
  if (text !== undefined) n.textContent = text;
  return n;
}

function shortTime(iso) {
  const d = new Date(iso);
  // Same shape as index.html's short(): the two pages must render one timestamp
  // the same way.
  return isNaN(d) ? iso : d.toLocaleString(L.locale, { day: "numeric", month: "numeric", hour: "2-digit", minute: "2-digit" });
}

const catLabel = key => (schema && schema.categoryLabels?.[key]) || key;

// One category section: { label, tag?, count, flagged, meta?, items:[{severity,text,timestamp}] }
function renderSection(body, section) {
  const box = node("div", "seg-theme");
  const heading = node("h3", null, section.label);
  if (section.tag) heading.appendChild(node("span", "seg-tag", section.tag));
  box.appendChild(heading);
  box.appendChild(node("p", "seg-meta",
    `${section.count} ${L.itemsWord}` + (section.meta ? ` · ${section.meta}` : "")));
  // ADR-0021 A2 parity with index.html: a possibly-manipulated (needs_review)
  // item stays in the count — so the warning that it is in the mix must show
  // here too, or the desk reads a poisoned count as clean.
  if (section.flagged > 0)
    box.appendChild(node("div", "flagwarn", `⚠ ${section.flagged} ${L.flaggedTheme} · ${L.flaggedHint}`));
  const list = node("ul", "seg-items");
  for (const item of section.items) {
    const li = node("li");
    const sevLabel = (schema && schema.severityLabels?.[item.severity]) || item.severity || "?";
    li.appendChild(node("span", "sev", sevLabel));
    li.appendChild(document.createTextNode(item.text));
    li.appendChild(node("span", "when", shortTime(item.timestamp)));
    list.appendChild(li);
  }
  box.appendChild(list);
  body.appendChild(box);
}

function renderTotals(body, total, unstructured) {
  let totalLine = `${total} ${L.segmentTotal}`;
  if (unstructured > 0)
    totalLine += ` · ${unstructured} ${L.segmentUnstructured}`;
  body.appendChild(node("p", "seg-total", totalLine));
}

// Phase B: the authoritative summary view from GET /live/report.
function renderSegment(report) {
  renderedL = L;
  const body = el("segmentBody");
  body.replaceChildren();
  if (report.totalItems === 0) {
    body.appendChild(node("p", "seg-total", L.segmentEmpty));
    return;
  }
  renderTotals(body, report.totalItems, report.structureFailedCount);

  if (report.alerts?.length) {
    body.appendChild(node("strong", null, `${L.segmentAlerts} (${report.alerts.length})`));
    for (const alert of report.alerts)
      body.appendChild(node("div", "seg-alert", alert.textExcerpt || alert.text));
  }

  // Yhteenveto on top: the ONE whole-window narrative (ADR-0026).
  if (report.overall) {
    const box = node("div", "seg-overall");
    box.appendChild(node("h3", null, `${L.summaryHeading}: ${report.overall.title}`));
    box.appendChild(node("p", "seg-narrative", report.overall.narrative));
    box.appendChild(node("p", "seg-meta", report.overall.directionLabel));
    body.appendChild(box);
  }

  // The server marks emergent topics explicitly (isEmergentTopic) and already
  // orders sections (demoted categories last) — the view never re-derives
  // grouping or ordering client-side.
  const sections = (report.themes ?? []).map(theme => ({
    label: theme.isEmergentTopic ? theme.title : catLabel(theme.category),
    tag: theme.isEmergentTopic ? catLabel(theme.category) : null,
    count: theme.count,
    flagged: theme.flaggedCount,
    meta: theme.directionLabel,
    items: theme.sources ?? [],
  }));
  const sevCounts = {};
  for (const section of sections)
    for (const item of section.items)
      sevCounts[item.severity] = (sevCounts[item.severity] || 0) + 1;
  // Charts cover STRUCTURED items only, so the entries tile counts the same
  // set the bars sum to — the unstructured remainder is reported in the
  // totals line above, never silently absorbed into a mismatching KPI.
  renderChartLayer(body, sections, sevCounts,
    report.totalItems - (report.structureFailedCount || 0),
    report.overall?.directionLabel);

  for (const section of sections)
    renderSection(body, section);
}

// ONE adapter for both render phases: identical strings and label chain so
// phase B can never relabel what phase A painted — and guarded, so a missing
// or failed charts.js degrades to a chartless summary instead of a
// ReferenceError killing every section below it.
function renderChartLayer(body, sections, sevCounts, total, directionLabel) {
  if (!window.FeedbackCharts) return;
  FeedbackCharts.render(body, {
    sections, sevCounts, total, directionLabel,
    declaredSeverities: schema?.severities,
    sevLabel: k => (schema && schema.severityLabels?.[k]) || k,
    strings: { entriesTile: L.tileEntries, flaggedTile: L.tileFlagged, trendTile: L.tileTrend,
               chartCategories: L.chartCategories, chartSeverity: L.chartSeverity },
  });
}

// Phase A: instant CATEGORY-grouped list built from raw items — no LLM, so a
// refresh always shows every stored entry within moments, for every visitor.
// Deliberately grouped by category ONLY: the emergent-topic split is the
// server's rule (ADR-0026) and is not re-implemented client-side — topics
// appear when the authoritative report (phase B) lands.
function renderQuick(items) {
  renderedL = L;
  const body = el("segmentBody");
  body.replaceChildren();
  if (items.length === 0) {
    body.appendChild(node("p", "seg-total", L.segmentEmpty));
    return;
  }
  const structured = items.filter(i => i.structure);
  renderTotals(body, items.length, items.length - structured.length);
  body.appendChild(node("p", "seg-meta seg-pending", L.summaryPending));

  const groups = new Map();
  const sevCounts = {};
  for (const item of structured) {
    const key = item.structure.category;
    if (!groups.has(key))
      groups.set(key, { category: key, label: catLabel(key), tag: null, count: 0, flagged: 0, items: [] });
    const group = groups.get(key);
    group.count++;
    if (item.needsReview) group.flagged++;
    group.items.push({ severity: item.structure.severity, text: item.text, timestamp: item.timestamp });
    sevCounts[item.structure.severity] = (sevCounts[item.structure.severity] || 0) + 1;
  }
  // Same ordering rule as the server, INCLUDING the tiebreak: demoted
  // categories (schema) last, then count, then category KEY (ordinal — the
  // server's StringComparer.Ordinal, not a locale label sort) — so phase B
  // never visibly reshuffles the page, even on equal counts.
  const demoted = schema?.demotedCategories || [];
  const sections = [...groups.values()].sort((a, b) =>
    (demoted.includes(a.category) - demoted.includes(b.category))
    || (b.count - a.count)
    || (a.category < b.category ? -1 : a.category > b.category ? 1 : 0));
  renderChartLayer(body, sections, sevCounts, structured.length, null);
  for (const section of sections)
    renderSection(body, section);
}

async function loadSegment() {
  if (segmentBusy) { segmentQueued = true; return; }
  segmentBusy = true;
  el("segmentRefresh").disabled = true;
  setStatus("segmentStatus", "", L.segmentLoading);
  // Whether THIS load painted phase A — the error message must never lean on a
  // previous load's stale content.
  let phaseARendered = false;
  try {
    // All three requests start immediately. The version tick is captured
    // BEFORE the report request: baselining to a pre-synthesis tick is
    // conservative — any ingest landing DURING the (possibly long) synthesis
    // still moves the epoch past the baseline, so the next poll refreshes.
    // Reading the tick afterwards would swallow exactly those ingests.
    const versionPromise = fetch(`${API}/live/version`);
    const itemsPromise = fetch(`${API}/live/feedback?limit=1000`);
    const reportPromise = fetch(`${API}/live/report`);
    // Phase A — instant: raw items, no LLM. A refresh must never look empty.
    try {
      const itemsRes = await itemsPromise;
      if (itemsRes.ok) {
        lastItems = await itemsRes.json();
        renderQuick(lastItems);
        phaseARendered = true;
      }
    } catch { /* phase B owns the error path */ }
    // Phase B — authoritative: the summary report (may run a synthesis).
    const res = await reportPromise;
    if (!res.ok) throw new Error();
    lastReport = await res.json();
    renderSegment(lastReport);
    setStatus("segmentStatus", "", "");
    // This refresh consumed the pre-report tick; an own save that bumped the
    // epoch before this load started is therefore never double-refreshed.
    try {
      const versionRes = await versionPromise;
      if (versionRes.ok) liveVersion = (await versionRes.json()).version;
    } catch { /* transient — the poll re-baselines */ }
  } catch {
    if (phaseARendered) {
      // Keep this load's entry list, but the optimistic "the AI is writing the
      // summary" line must not survive a failed synthesis.
      el("segmentBody").querySelector(".seg-pending")?.remove();
      setStatus("segmentStatus", "err", L.summaryFailed);
    } else {
      setStatus("segmentStatus", "err", L.segmentError);
    }
  } finally {
    segmentBusy = false;
    el("segmentRefresh").disabled = false;
    if (segmentQueued) { segmentQueued = false; loadSegment(); }
  }
}

el("segmentRefresh").addEventListener("click", loadSegment);

// ----- Live adaptivity: the segment follows EVERY feedback received -----
// /live/version is the live channel's change tick (the report-cache epoch,
// bumped by every ingest/restructure, served from memory — no DB or LLM
// work). Polling it costs almost nothing, so every open desk view refreshes
// within one poll interval of ANYONE's save, not only its own. The poll
// pauses while the tab is hidden and re-checks immediately on return.
let liveVersion = null;

async function checkLiveVersion() {
  if (document.visibilityState === "hidden" || segmentBusy) return;
  try {
    const res = await fetch(`${API}/live/version`);
    if (!res.ok) return;
    const { version } = await res.json();
    const changed = liveVersion !== null && version !== liveVersion;
    liveVersion = version;
    // Refresh on change — and whenever the authoritative summary has never
    // rendered on this page (first load failed, or phase B failed while the
    // entry list painted): the page keeps retrying itself until it is whole.
    if (changed || !lastReport) loadSegment();
  } catch { /* transient — the next tick retries */ }
}

// Self-scheduling with ±20% jitter: many open views must not synchronize
// their polls (or their post-save refresh bursts) against the shared proxy
// rate ceiling.
(function scheduleTick() {
  setTimeout(async () => { await checkLiveVersion(); scheduleTick(); }, 20000 + Math.random() * 10000);
})();
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") checkLiveVersion();
});

applyLanguage();                 // en chrome immediately (resolves on /schema)
setStatus("status1", "", L.connecting);
loadSchema();
loadSegment();                   // its success re-baselines the version tick
</script>
</body>
</html>
