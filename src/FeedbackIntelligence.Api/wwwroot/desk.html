<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Palaute — tiskikirjaus</title>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1c2430; --mut:#66707d; --line:#d9dde3;
          --acc:#0b5fa5; --ok:#1b7f4d; --warn:#b3541e; --err:#b3261e; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width:34rem; margin:0 auto; padding:1rem; }
  h1 { font-size:1.15rem; margin:.5rem 0 1rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:.75rem;
          padding:1rem; margin-bottom:1rem; }
  textarea { width:100%; min-height:6.5rem; font:inherit; padding:.65rem;
             border:1px solid var(--line); border-radius:.5rem; resize:vertical; }
  textarea[readonly] { background:#eef1f4; color:var(--mut); }
  label { display:block; font-size:.8rem; color:var(--mut); margin:.7rem 0 .2rem; }
  select, input[type=text] { width:100%; font:inherit; padding:.55rem;
             border:1px solid var(--line); border-radius:.5rem; background:#fff; }
  button { font:inherit; font-weight:600; border:0; border-radius:.6rem;
           padding:.8rem 1.1rem; cursor:pointer; min-height:48px; }
  .primary { background:var(--acc); color:#fff; width:100%; }
  .primary:disabled { opacity:.55; cursor:default; }
  .ghost { background:transparent; color:var(--acc); }
  .row { display:flex; gap:.6rem; margin-top:1rem; }
  .row button { flex:1; }
  .status { margin:.6rem 0 0; font-size:.9rem; min-height:1.3rem; }
  .status.ok { color:var(--ok); } .status.err { color:var(--err); } .status.warn { color:var(--warn); }
  .corrected { outline:2px solid var(--warn); outline-offset:1px; }
  .hint { font-size:.8rem; color:var(--mut); margin-top:.4rem; }
  #interpret-card { display:none; }
</style>
</head>
<body>
<main>
  <h1>Tiskikirjaus — kirjaa asiakaspalaute yhdellä lauseella</h1>

  <div class="card">
    <label for="text">Mitä asiakas sanoi?</label>
    <textarea id="text" maxlength="800" placeholder="esim. asiakas sano et maitokaapis oli vanhoi purkkei" autofocus></textarea>
    <div class="hint"><span id="chars">0</span>/800 merkkiä</div>
    <div class="row"><button class="primary" id="interpret" disabled>Tulkitse</button></div>
    <p class="status" id="status1">Yhdistetään palvelimeen…</p>
  </div>

  <div class="card" id="interpret-card">
    <strong>Tulkinta — tarkista ja korjaa tarvittaessa</strong>
    <label for="category">Osasto</label>
    <select id="category"></select>
    <label for="theme">Aihe</label>
    <input type="text" id="theme" maxlength="120">
    <label for="severity">Vakavuus</label>
    <select id="severity"></select>
    <label for="type">Tyyppi</label>
    <select id="type"></select>
    <div class="row">
      <button class="ghost" id="cancel">Peruuta</button>
      <button class="primary" id="save">Tallenna</button>
    </div>
    <p class="status" id="status2"></p>
  </div>
</main>

<script src="./config.js"></script>
<script>
"use strict";
// Same-origin locally; on the static host, config.js (written at publish
// time) points API at the Tailscale Funnel backend.
const API = window.API_BASE || "";
const FI = {
  categories: {
    maito_kylma: "Maito & kylmä", hevi: "Hevi", kuiva_elintarvike: "Kuivat elintarvikkeet",
    liha_kala: "Liha & kala", leipa: "Leipä", kassa_palvelu: "Kassa & palvelu",
    piha_puutarha: "Piha & puutarha", rakennustarvike: "Rakennustarvikkeet",
    tyokalut: "Työkalut", sisustus_maalit: "Sisustus & maalit", sahko_lvi: "Sähkö & LVI",
    varasto_nouto: "Varasto & nouto", verkkokauppa_toimitus: "Verkkokauppa & toimitus", muu: "Muu",
  },
  severities: { low: "Matala", medium: "Keskitaso", high: "Korkea", critical: "Kriittinen" },
  types: { complaint: "Valitus", praise: "Kehu", suggestion: "Ehdotus", question: "Kysymys", other: "Muu" },
};

const el = id => document.getElementById(id);

// Per-entry state. interpretedText is captured at interpret time and is the
// ONLY text ever saved — the model's structure must never be attached to text
// the model did not see. entryId makes save retries idempotent (server 409s
// the duplicate instead of double-storing).
let model = null;
let interpretedText = null;
let language = "fi";
let entryId = null;
let modelFailed = false;
let schemaLoaded = false;

function fillSelect(select, values, labels) {
  select.innerHTML = "";
  for (const value of values) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = labels[value] ?? value;
    select.appendChild(option);
  }
}

async function loadSchema() {
  try {
    const res = await fetch(`${API}/schema`);
    if (!res.ok) throw new Error();
    const schema = await res.json();
    fillSelect(el("category"), schema.categories, FI.categories);
    fillSelect(el("severity"), schema.severities, FI.severities);
    fillSelect(el("type"), schema.types, FI.types);
    schemaLoaded = true;
    el("interpret").disabled = false;
    setStatus("status1", "", "");
  } catch {
    schemaLoaded = false;
    el("interpret").disabled = true;
    setStatus("status1", "err", "Palvelin ei vastaa — yritetään uudelleen…");
    setTimeout(loadSchema, 3000);
  }
}

el("text").addEventListener("input", () => { el("chars").textContent = el("text").value.length; });

el("interpret").addEventListener("click", async () => {
  if (!schemaLoaded) return;
  const text = el("text").value.trim();
  if (!text) { setStatus("status1", "err", "Kirjoita palaute ensin."); return; }
  el("interpret").disabled = true;
  setStatus("status1", "", "Tulkitaan…");
  try {
    const res = await fetch(`${API}/interpret`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (res.status === 503) { setStatus("status1", "warn", "Ruuhkaa — yritä hetken päästä uudelleen."); return; }
    if (!res.ok) { setStatus("status1", "err", "Tulkinta epäonnistui."); return; }
    const data = await res.json();
    startEntry(text);
    if (data.failed || !data.structure) {
      // Model failed: human authors the structure; the failure is recorded
      // (modelInterpretationFailed) so telemetry never mistakes this for a
      // zero-correction success.
      model = null;
      modelFailed = true;
      setStatus("status1", "warn", "Automaattinen tulkinta ei onnistunut — täytä kentät itse.");
      showForm({ category: "muu", theme: "", severity: "medium", type: "other", language: "fi" });
      return;
    }
    model = data.structure;
    modelFailed = false;
    setStatus("status1", "ok", "Tulkinta valmis — tarkista alta.");
    showForm(data.structure);
  } catch {
    setStatus("status1", "err", "Yhteysvirhe — palvelin ei vastaa.");
  } finally {
    el("interpret").disabled = false;
  }
});

function startEntry(text) {
  interpretedText = text;
  entryId = "desk-" + crypto.randomUUID();
  el("text").readOnly = true;
}

function endEntry() {
  interpretedText = null;
  entryId = null;
  model = null;
  modelFailed = false;
  el("text").readOnly = false;
}

function showForm(structure) {
  language = structure.language || "fi";
  el("category").value = structure.category;
  el("theme").value = structure.theme;
  el("severity").value = structure.severity;
  el("type").value = structure.type;
  for (const id of ["category", "theme", "severity", "type"]) el(id).classList.remove("corrected");
  el("interpret-card").style.display = "block";
  setStatus("status2", "", "");
  el("interpret-card").scrollIntoView({ behavior: "smooth" });
}

function markCorrections() {
  if (!model) return;
  for (const field of ["category", "theme", "severity", "type"])
    el(field).classList.toggle("corrected", el(field).value !== model[field]);
}
for (const field of ["category", "theme", "severity", "type"])
  el(field).addEventListener("change", markCorrections);
el("theme").addEventListener("input", markCorrections);

el("cancel").addEventListener("click", () => {
  el("interpret-card").style.display = "none";
  endEntry();
  setStatus("status1", "", "");
});

el("save").addEventListener("click", async () => {
  const accepted = {
    category: el("category").value,
    theme: el("theme").value.trim(),
    severity: el("severity").value,
    type: el("type").value,
    language,
  };
  if (!accepted.category || !accepted.severity || !accepted.type) {
    setStatus("status2", "err", "Valinnat puuttuvat — päivitä sivu ja yritä uudelleen.");
    return;
  }
  if (!accepted.theme) { setStatus("status2", "err", "Aihe ei voi olla tyhjä."); return; }

  const corrections = [];
  if (model)
    for (const field of ["category", "theme", "severity", "type"])
      if (accepted[field] !== model[field])
        corrections.push({ field, modelValue: model[field], humanValue: accepted[field] });

  el("save").disabled = true;
  setStatus("status2", "", "Tallennetaan…");
  try {
    const res = await fetch(`${API}/feedback`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id: entryId,
        source: "desk",
        text: interpretedText,
        timestamp: new Date().toISOString(),
        acceptedStructure: accepted,
        corrections: corrections.length > 0 ? corrections : null,
        modelInterpretationFailed: modelFailed,
      }),
    });
    if (res.status === 503) { setStatus("status2", "warn", "Ruuhkaa — yritä hetken päästä."); return; }
    // 409 = an earlier attempt of THIS entry already landed: that is a success.
    if (!res.ok && res.status !== 409) { setStatus("status2", "err", "Tallennus epäonnistui."); return; }
    setStatus("status1", "ok", res.status === 409 ? "Kirjattu ✓ (oli jo tallennettu)" : "Kirjattu ✓ — kiitos!");
    el("interpret-card").style.display = "none";
    endEntry();
    el("text").value = "";
    el("chars").textContent = "0";
    el("text").focus();
  } catch {
    setStatus("status2", "warn", "Yhteysvirhe — tallennus jäi epävarmaksi. Yritä uudelleen: sama kirjaus ei tuplaannu.");
  } finally {
    el("save").disabled = false;
  }
});

function setStatus(id, kind, message) {
  const node = el(id);
  node.className = "status" + (kind ? " " + kind : "");
  node.textContent = message;
}

loadSchema();
</script>
</body>
</html>
