<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback situation</title>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1c2430; --mut:#66707d; --line:#d9dde3;
          --acc:#0b5fa5; --err:#b3261e; --warn:#b3541e; --ok:#1b7f4d; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width:52rem; margin:0 auto; padding:1rem; }
  header { display:flex; flex-wrap:wrap; gap:.6rem; align-items:center; margin:.4rem 0 1rem; }
  h1 { font-size:1.25rem; margin:0; flex:1; }
  select, button { font:inherit; padding:.5rem .8rem; border-radius:.5rem; border:1px solid var(--line); background:#fff; }
  button.primary { background:var(--acc); color:#fff; border:0; font-weight:600; cursor:pointer; }
  .badge { border-radius:.4rem; padding:.15rem .55rem; font-size:.78rem; color:#fff; }
  .badge.live { background:var(--ok); } .badge.snap { background:var(--warn); }
  h2 { font-size:1.05rem; margin:1.3rem 0 .5rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:.7rem; padding:.9rem; margin:.6rem 0; }
  .card.alert { border-left:4px solid var(--err); }
  .muted { color:var(--mut); font-size:.85rem; }
  .showmsgs { margin-top:.7rem; background:#eef2f6; border:1px solid var(--line); color:var(--acc);
              font-weight:600; font-size:.9rem; cursor:pointer; padding:.45rem .8rem; border-radius:.5rem; }
  .showmsgs:hover { background:#dfe7ee; }
  .msg-title { margin:.1rem 0; font-size:1.05rem; }
  .msglist { max-height:64vh; overflow:auto; margin-top:.7rem; }
  .msgrow { padding:.7rem 0; border-top:1px solid var(--line); }
  .msgrow:first-child { border-top:0; }
  .msgmeta { display:flex; align-items:center; gap:.45rem; font-size:.8rem; color:var(--mut); }
  .msgtext { margin:.35rem 0 0; white-space:pre-wrap; }
  .sevdot { width:.7rem; height:.7rem; border-radius:50%; display:inline-block; flex:none; background:#8a94a0; }
  .sev-medium { background:#c99a3b; } .sev-high { background:#b3541e; } .sev-critical { background:#b3261e; }
  dialog { border:1px solid var(--line); border-radius:.7rem; max-width:42rem; width:92vw; padding:1rem; }
  dialog::backdrop { background:rgba(20,25,30,.45); }
  #status { min-height:1.2rem; font-size:.9rem; color:var(--mut); }
  .foot { margin-top:2rem; font-size:.8rem; color:var(--mut); }
</style>
</head>
<body>
<main>
  <header>
    <h1 id="h1"></h1>
    <span id="mode" class="badge live" hidden></span>
    <select id="window">
      <option value="today"></option>
      <option value="7" selected></option>
      <option value="30"></option>
      <option value="custom"></option>
    </select>
    <span id="custom-range" hidden>
      <input type="date" id="from-date"> – <input type="date" id="to-date">
    </span>
    <button class="primary" id="refresh"></button>
  </header>
  <p id="status"></p>
  <section id="report"></section>
  <p class="foot" id="foot"></p>
</main>

<dialog id="item-dialog">
  <div id="item-body"></div>
  <div style="text-align:right; margin-top:.8rem"><button id="close"></button></div>
</dialog>

<script src="./config.js"></script>
<script>
"use strict";
// Same-origin locally; on the static host, config.js (written at publish
// time) points API at the Tailscale Funnel backend.
const API = window.API_BASE || "";
const el = id => document.getElementById(id);
const text = value => document.createTextNode(value ?? "");

// User-facing text keyed by the domain language. The report carries `language`
// (so snapshot mode is correct even with the backend down); /schema also gives
// it (plus category labels) when the backend is up.
const STR = {
  fi: {
    htmlLang: "fi", locale: "fi-FI", pageTitle: "Palautetilanne", h1: "Palautetilanne",
    today: "Tänään", d7: "7 päivää", d30: "30 päivää", custom: "Oma aikaväli…", refresh: "Päivitä",
    footBefore: "Jokainen väite on jäljitettävissä: avaa teeman takaa löytyvät viestit. Kirjaa uusi palaute: ",
    footLink: "tiskikirjaus", close: "Sulje", live: "Live", snap: "Tilannekuva",
    showMessages: "Näytä", messagesWord: "viestiä",
    sev: { low: "matala", medium: "kohtalainen", high: "korkea", critical: "kriittinen", unknown: "–" },
    pickBothDates: "Valitse oman aikavälin molemmat päivät.",
    compiling: "Koostetaan raporttia… (kielimalli kirjoittaa tiivistelmät)",
    window: "Aikaväli", items: "palautetta", noStructure: "ilman rakennetta",
    dropped: "perustelematonta väitettä hylätty", fallbacks: "koostetta ilman kielimallia",
    alerts: "Hälytykset", noAlerts: "Ei hälytyksiä aikavälillä.", keyword: "sanahaku", model: "kielimalli",
    themes: "Teemat ja trendit", trend: "suunta", autoSummary: "automaattinen kooste",
    snapShown: "Palvelin ei ollut tavoitettavissa — näytetään viimeisin tallennettu tilannekuva.",
    noReport: "Raporttia ei saatu eikä tallennettua tilannekuvaa löytynyt.",
    itemError: "Palautetta ei voitu avata (palvelin ei vastaa).",
    theme: "aihe", severity: "vakavuus", type: "tyyppi", correctedAtDesk: "korjattu tiskillä: ",
  },
  en: {
    htmlLang: "en", locale: "en-GB", pageTitle: "Feedback situation", h1: "Feedback situation",
    today: "Today", d7: "7 days", d30: "30 days", custom: "Custom range…", refresh: "Refresh",
    footBefore: "Every claim is traceable: open the messages behind each theme. Log new feedback: ",
    footLink: "desk entry", close: "Close", live: "Live", snap: "Snapshot",
    showMessages: "Show", messagesWord: "messages",
    sev: { low: "low", medium: "medium", high: "high", critical: "critical", unknown: "–" },
    pickBothDates: "Pick both dates for the custom range.",
    compiling: "Compiling the report… (the model writes the summaries)",
    window: "Window", items: "items", noStructure: "without structure",
    dropped: "ungrounded claim(s) dropped", fallbacks: "summary(ies) without the model",
    alerts: "Alerts", noAlerts: "No alerts in the window.", keyword: "keyword", model: "model",
    themes: "Themes & trends", trend: "trend", autoSummary: "automated summary",
    snapShown: "The server was unreachable — showing the last saved snapshot.",
    noReport: "No report and no saved snapshot found.",
    itemError: "Could not open the feedback item (the server is not responding).",
    theme: "theme", severity: "severity", type: "type", correctedAtDesk: "corrected at desk: ",
  },
};

let schema = null, L = STR.fi;

function node(tag, className, children) {
  const n = document.createElement(tag);
  if (className) n.className = className;
  for (const child of children ?? []) n.appendChild(typeof child === "string" ? text(child) : child);
  return n;
}

async function tryFetchJson(url) {
  try { const res = await fetch(url); return res.ok ? await res.json() : null; }
  catch { return null; }
}

// Apply the language to the static chrome. Called from /schema on load and from
// each render (report.language is authoritative and works in snapshot mode).
function applyLanguage(lang) {
  L = STR[lang] || STR.en;
  document.documentElement.lang = L.htmlLang;
  document.title = L.pageTitle;
  el("h1").textContent = L.h1;
  const w = el("window").options;
  w[0].textContent = L.today; w[1].textContent = L.d7; w[2].textContent = L.d30; w[3].textContent = L.custom;
  el("refresh").textContent = L.refresh;
  el("close").textContent = L.close;
  const foot = el("foot");
  foot.innerHTML = "";
  foot.appendChild(text(L.footBefore));
  const a = node("a", null, [L.footLink]); a.href = "/desk.html";
  foot.appendChild(a);
}

const catLabel = key => (schema && schema.categoryLabels && schema.categoryLabels[key]) || key;
const labelOf = (map, key) => (map && map[key]) || key;

function windowRange() {
  const choice = el("window").value;
  const to = new Date();
  if (choice === "today") {
    const from = new Date();
    from.setHours(0, 0, 0, 0);
    return { from, to };
  }
  if (choice === "custom") {
    const from = el("from-date").valueAsDate;
    const customTo = el("to-date").valueAsDate;
    if (!from || !customTo) return null;
    customTo.setHours(23, 59, 59, 999);
    return { from, to: customTo };
  }
  return { from: new Date(to.getTime() - Number(choice) * 24 * 3600 * 1000), to };
}

async function loadReport() {
  const range = windowRange();
  if (!range) { setStatus(L.pickBothDates); return; }
  setStatus(L.compiling);
  el("refresh").disabled = true;
  try {
    const res = await fetch(`${API}/report?from=${range.from.toISOString()}&to=${range.to.toISOString()}`);
    if (!res.ok) throw new Error("report " + res.status);
    render(await res.json(), true);
    setStatus("");
  } catch {
    // Fallback chain: backend snapshot endpoint, then the static copy published
    // next to this page. Each step must survive a NETWORK error.
    const snap = await tryFetchJson(`${API}/report/snapshot`)
      ?? await tryFetchJson("./report-latest.json");
    if (snap) {
      render(snap, false);
      setStatus(L.snapShown);
    } else {
      setStatus(L.noReport);
    }
  } finally {
    el("refresh").disabled = false;
  }
}

function render(report, live) {
  applyLanguage(report.language); // authoritative, works in snapshot mode too

  const mode = el("mode");
  mode.hidden = false;
  mode.className = "badge " + (live ? "live" : "snap");
  mode.textContent = live ? L.live : L.snap;

  const root = el("report");
  root.innerHTML = "";
  root.appendChild(node("p", "muted", [
    `${L.window} ${short(report.windowFrom)} – ${short(report.windowTo)} · ${report.totalItems} ${L.items}` +
    (report.structureFailedCount ? ` · ${report.structureFailedCount} ${L.noStructure}` : "") +
    (report.droppedClaimCount ? ` · ${report.droppedClaimCount} ${L.dropped}` : "") +
    (report.llmFallbackCount ? ` · ${report.llmFallbackCount} ${L.fallbacks}` : ""),
  ]));

  root.appendChild(node("h2", null, [`${L.alerts} (${report.alerts.length})`]));
  if (report.alerts.length === 0)
    root.appendChild(node("p", "muted", [L.noAlerts]));
  for (const alert of report.alerts) {
    const origin = alert.llmReason
      ? L.model + ": " + alert.llmReason
      : L.keyword + ": " + alert.deterministicHits.map(h => h.pattern).join(", ");
    root.appendChild(node("div", "card alert", [
      node("strong", null, [alert.textExcerpt]),
      node("div", "muted", [`${alert.source} · ${short(alert.timestamp)} · ${origin}`]),
    ]));
  }

  root.appendChild(node("h2", null, [`${L.themes} (${report.themes.length})`]));
  for (const theme of report.themes) {
    const card = node("div", "card", [
      node("strong", null, [theme.title]),
      node("div", "muted", [`${catLabel(theme.category)} · ${theme.count} ${L.items} · ${L.trend}: ${theme.directionLabel ?? theme.direction}` +
        (theme.narrativeFromLlm ? "" : ` · ${L.autoSummary}`)]),
      node("p", null, [theme.narrative]),
    ]);
    const sources = theme.sources || [];
    if (sources.length) {
      const btn = node("button", "showmsgs", [`${L.showMessages} ${sources.length} ${L.messagesWord} →`]);
      btn.addEventListener("click", () => openMessages(theme));
      card.appendChild(btn);
    }
    root.appendChild(card);
  }
}

function severityMeta(sev) {
  const label = (schema && schema.severityLabels && schema.severityLabels[sev]) || (L.sev && L.sev[sev]) || sev;
  const cls = ["medium", "high", "critical"].includes(sev) ? "sev-" + sev : "";
  return { label, cls };
}

// One click on a theme opens ALL its source messages. The messages are embedded
// in the report, so this works live AND from a snapshot (no per-item fetch).
function openMessages(theme) {
  const body = el("item-body");
  body.innerHTML = "";
  body.appendChild(node("h3", "msg-title", [theme.title]));
  body.appendChild(node("div", "muted", [`${catLabel(theme.category)} · ${theme.sources.length} ${L.messagesWord}`]));
  const list = node("div", "msglist", []);
  for (const s of theme.sources) {
    const sm = severityMeta(s.severity);
    const meta = node("div", "msgmeta", [
      node("span", ("sevdot " + sm.cls).trim(), []),
      node("span", null, [`${s.source} · ${short(s.timestamp)} · ${sm.label}`]),
    ]);
    list.appendChild(node("div", "msgrow", [meta, node("p", "msgtext", [s.text])]));
  }
  body.appendChild(list);
  el("item-dialog").showModal();
}

function short(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleString(L.locale, { day: "numeric", month: "numeric", hour: "2-digit", minute: "2-digit" });
}

function setStatus(message) { el("status").textContent = message; }

el("refresh").addEventListener("click", loadReport);
el("window").addEventListener("change", () => {
  const custom = el("window").value === "custom";
  el("custom-range").hidden = !custom;
  if (!custom) loadReport();
});
el("close").addEventListener("click", () => el("item-dialog").close());

async function init() {
  // /schema (when the backend is up) gives category labels + the language for the
  // chrome before the first report; render() re-applies from report.language.
  schema = await tryFetchJson(`${API}/schema`);
  applyLanguage(schema && schema.language);
  await loadReport();
}
init();
</script>
</body>
</html>
