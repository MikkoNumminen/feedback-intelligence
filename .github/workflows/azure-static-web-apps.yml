name: Deploy static frontend (Azure SWA Free)

# Deploys dist/ (built by tools/publish-frontend.ps1) plus the api/ managed
# function to a FREE-tier Azure Static Web App. The backend itself is NOT in
# Azure: the pages call same-origin /api/*, and the managed function forwards
# server-side to the Tailscale Funnel (ADR-0025) - the browser never makes a
# cross-origin or public-to-local request, which Chrome's Local Network Access
# permission would block on the operator's own machine. Managed functions are
# included in the Free tier => still $0.
# See docs/decisions/0016-zero-cost-static-web-apps-deploy.md + ADR-0025.
on:
  push:
    branches: [master]
    paths:
      - 'src/FeedbackIntelligence.Api/wwwroot/index.html'
      - 'src/FeedbackIntelligence.Api/wwwroot/desk.html'
      - 'api/**'
      - 'deploy/staticwebapp.config.json'
      - 'deploy/snapshot/report-latest.json'
      - 'deploy/snapshot/report-latest.html'
      - 'tools/publish-frontend.ps1'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:

# One deploy at a time; never cancel a running upload.
concurrency:
  group: swa-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: build dist/ + deploy to SWA Free
    runs-on: ubuntu-latest
    # Deploy on/off gate. The variable's VALUE is no longer consumed (the pages
    # call same-origin /api and the Funnel host lives in api/src/index.js) — its
    # PRESENCE is the switch, kept as a variable because job-level `if` cannot
    # read secrets. Unset it to pause deploys; do NOT delete it as "unused
    # cleanup" or every deploy silently skips. See operations.md setup step 2.
    if: ${{ vars.FUNNEL_API_BASE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/ (config.js points at the same-origin /api proxy)
        shell: pwsh
        run: |
          # ApiBase '/api': the pages call their own origin; the managed function
          # (api/) forwards to the Funnel server-side (ADR-0025). The Funnel URL
          # itself lives in api/src/index.js, not in config.js, anymore.
          # A committed demo snapshot (deploy/snapshot) exists, so ALWAYS bundle it —
          # otherwise a push deploy would leave the SWA with no offline fallback (404),
          # and the shared link goes blank whenever the live backend is unreachable.
          $splat = @{ ApiBase = '/api'; PublishSnapshot = $true }
          ./tools/publish-frontend.ps1 @splat
          Write-Host "dist/ contents:"
          Get-ChildItem ./dist | Select-Object Name, Length | Format-Table -AutoSize

      - name: Deploy dist/ to Azure Static Web Apps (Free)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # App folder uploaded verbatim (pre-built); the api/ managed function IS
          # built by the action (Node). Managed functions ride the Free tier => $0.
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
