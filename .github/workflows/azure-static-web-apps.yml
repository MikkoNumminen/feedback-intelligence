name: Deploy static frontend (Azure SWA Free)

# Static-only deploy: builds dist/ from tools/publish-frontend.ps1 and uploads it
# to a FREE-tier Azure Static Web App. The backend is NOT in Azure - the browser
# calls the Tailscale Funnel URL baked into config.js. No managed API, no Azure
# Functions, no App Service => $0. See docs/decisions/0016-zero-cost-static-web-apps-deploy.md.
on:
  push:
    branches: [master]
    paths:
      - 'src/FeedbackIntelligence.Api/wwwroot/index.html'
      - 'src/FeedbackIntelligence.Api/wwwroot/desk.html'
      - 'deploy/staticwebapp.config.json'
      - 'deploy/snapshot/report-latest.json'
      - 'deploy/snapshot/report-latest.html'
      - 'tools/publish-frontend.ps1'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:

# One deploy at a time; never cancel a running upload.
concurrency:
  group: swa-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: build dist/ + deploy to SWA Free
    runs-on: ubuntu-latest
    # Skip cleanly (neutral, not a red failure) until the owner configures the
    # Funnel URL variable and the deployment-token secret. See operations.md.
    if: ${{ vars.FUNNEL_API_BASE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/ (config.js points at the Funnel backend)
        shell: pwsh
        env:
          FUNNEL_API_BASE: ${{ vars.FUNNEL_API_BASE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FUNNEL_API_BASE)) {
            throw "Repo variable FUNNEL_API_BASE is not set - cannot build config.js."
          }
          # A committed demo snapshot (deploy/snapshot) exists, so ALWAYS bundle it —
          # otherwise a push deploy would leave the SWA with no offline fallback (404),
          # and the shared link goes blank whenever the live backend is unreachable.
          $splat = @{ ApiBase = $env:FUNNEL_API_BASE; PublishSnapshot = $true }
          ./tools/publish-frontend.ps1 @splat
          Write-Host "dist/ contents:"
          Get-ChildItem ./dist | Select-Object Name, Length | Format-Table -AutoSize

      - name: Deploy dist/ to Azure Static Web Apps (Free)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # Pre-built folder uploaded verbatim: no Oryx build, no managed API => stays $0.
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
